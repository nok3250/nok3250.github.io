<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flatty — аренда квартир</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           text-align: center; padding: 60px 20px; background: #f5f5f5; color: #333; margin: 0; }
    h1 { font-size: 32px; margin-bottom: 8px; }
    p  { color: #666; font-size: 16px; margin-bottom: 36px; }
    .btn { display: inline-block; margin: 8px; padding: 14px 28px;
           border-radius: 12px; text-decoration: none; font-size: 16px; font-weight: 600; color: #fff; }
    .ios     { background: #000; }
    .android { background: #34a853; }
  </style>
</head>
<body>
  <h1>🏡 Flatty</h1>
  <p id="msg">Установите приложение, чтобы просмотреть объявление</p>
  <a class="btn ios"     id="ios-btn"     href="https://apps.apple.com/ru/app/id1467740493">App Store</a>
  <a class="btn android" id="android-btn" href="https://play.google.com/store/apps/details?id=com.kadilo.inc.flatty">Google Play</a>
  <script>
    var ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/.test(ua)) {
      document.getElementById('android-btn').style.display = 'none';
      document.getElementById('msg').textContent = 'Установите Flatty в App Store';
    } else if (/Android/.test(ua)) {
      document.getElementById('ios-btn').style.display = 'none';
      document.getElementById('msg').textContent = 'Установите Flatty в Google Play';
    }
  </script>
</body>
</html>
